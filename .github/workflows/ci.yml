name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: reliability_fw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d reliability_fw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/reliability_fw_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Verify schema
        run: |
          psql postgresql://user:pass@localhost:5432/reliability_fw_test \
            -c "\dt reliability.*" \
            -c "SELECT schemaname, tablename FROM pg_tables WHERE schemaname IN ('public','reliability') ORDER BY schemaname, tablename;"

      - name: Run tests
        run: python -m pytest tests/ -v
