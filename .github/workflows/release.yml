name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Extract changelog entry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^\#\# \[${VERSION}\]/{found=1; next} found && /^\#\# /{exit} found{print}" CHANGELOG.md > /tmp/release_notes.md

      - name: Create GitHub Release with wheel attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "${TAG}" dist/* --title "${TAG}" --notes-file /tmp/release_notes.md

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://upload.pkg.github.com/
        run: twine upload dist/*
